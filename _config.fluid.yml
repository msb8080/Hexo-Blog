# Fluid Theme Override Configuration
# 紫色 3D Bento 风格适配
# Docs: https://hexo.fluid-dev.com/docs/guide/

# 字体配置
font:
  font_size: 16px
  font_family: "'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif"
  letter_spacing: 0.02em
  code_font_size: 85%

# 自定义 CSS/JS 注入
custom_js:
  - /js/purple-animations.js

custom_css:
  - /css/purple-theme.css

# 顶部导航栏
navbar:
  blog_title: "AI Composer 技术猿"
  menu:
    - { key: "home", link: "/", icon: "iconfont icon-home-fill", name: "首页" }
    - { key: "archive", link: "/archives/", icon: "iconfont icon-archive-fill", name: "归档" }
    - { key: "category", link: "/categories/", icon: "iconfont icon-category-fill", name: "分类" }
    - { key: "tag", link: "/tags/", icon: "iconfont icon-tags-fill", name: "标签" }
    - { key: "about", link: "/about/", icon: "iconfont icon-user-fill", name: "关于" }
    - { key: "guide", link: "/2026/04/30/我的博客搭建复盘-ai-composer技术猿的hexo实践与长期写作规划-2026-04-30/", icon: "iconfont icon-code-fill", name: "搭建复盘" }

# 首页配置
index:
  banner_img: /img/default.png
  banner_img_height: 92
  banner_mask_alpha: 0.45
  slogan:
    enable: true
    text:
      - "代码会报错，计划会偏航，人会成长。"
      - "面试总结、投资理财与副业研究。"
      - "把复杂问题拆成可执行流程。"
      - "今天修系统，明天修自己。"
      - "长期主义不是慢，是持续迭代。"
  auto_excerpt:
    enable: true
  post_meta:
    date: true
    category: true
    tag: true

# 文章页
post:
  default_index_img: /img/default.png

# 颜色方案 - 紫色主题
color:
  navbar_bg_color: "rgba(43, 27, 84, 0.85)"
  navbar_bg_color_dark: "#2b1b54"
  body_bg_color: "#312052"
  body_bg_color_dark: "#312052"
  link_hover_color: "#a894df"
  button_hover_bg_color: "rgba(126, 90, 220, 0.2)"

# 代码高亮
code:
  copy_btn: true
  language:
    enable: true
    default: "TEXT"
  highlight:
    enable: true
    line_number: true
    lib: "highlightjs"
    highlightjs:
      style: "github gist"
      style_dark: "dark"

# 暗色模式
dark_mode:
  enable: true
  default: dark

# 好玩的功能
fun_features:
  typing:
    enable: true
    typeSpeed: 45
    cursorChar: "|"
    loop: true
    scope: ["home"]
  anchorjs:
    enable: true
    element: h1,h2,h3,h4,h5,h6
    placement: left
    visible: hover
  progressbar:
    enable: true
    height_px: 3
    color: "#7e5adc"

# 页脚
footer:
  content: '
    <a href="https://github.com/msb8080" target="_blank" rel="noopener">GitHub</a> ·
    <a href="https://msb8080.github.io" target="_blank" rel="noopener">主页</a>
    <br>
    <span style="opacity:0.5; font-family: Space Mono, monospace; font-size: 0.8rem;">Powered by Hexo & Fluid · Themed with 💜</span>
  '

# 关于页
about:
  banner_img: /img/default.png
  banner_img_height: 60
  banner_mask_alpha: 0.3
  auto_open_edit: false
  description:
    - "AI 后端开发工程师"
    - "持续迭代，长期主义"
  social:
    - { class: "iconfont icon-github-fill", link: "https://github.com/msb8080", tip: "GitHub" }

# 搜索
search:
  enable: true
  path: local-search.xml
